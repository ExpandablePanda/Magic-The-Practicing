[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"
  # FORCE IGNORE: Stop Netlify from ever building on their servers (saves all tokens)
  # This tells Netlify "skip this build" for every single push.
  ignore = "exit 0"

[build.environment]
  NPM_FLAGS = "--legacy-peer-deps"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
